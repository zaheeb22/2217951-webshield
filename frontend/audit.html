<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (["localhost", "0.0.0.0", "::1"].includes(window.location.hostname)) {
        const canonicalUrl = new URL(window.location.href);
        canonicalUrl.hostname = "127.0.0.1";
        window.location.replace(canonicalUrl.toString());
      }
    </script>
    <title>Audit Trail | WebShield Lab</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=20260408a" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Frontend Page</p>
          <h1>Audit Trail</h1>
        </div>
        <nav class="nav">
          <a href="index.html">Overview</a>
          <a href="dashboard.html">User Dashboard</a>
          <a href="admin.html">Admin</a>
          <a href="lab.html">Lab Demo</a>
          <button id="logoutButton" class="ghost-button" type="button">Logout</button>
        </nav>
      </header>

      <main class="grid">
        <section class="panel">
          <p class="eyebrow">Access</p>
          <h2>Administrator session</h2>
          <div id="auditAdminInfo" class="info-grid"></div>
          <p id="auditPageMessage" class="status-text"></p>
        </section>

        <section class="panel">
          <p class="eyebrow">Summary</p>
          <h2>Audit overview</h2>
          <div id="auditSummary" class="info-grid"></div>
        </section>

        <section class="panel full-span">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Audit Trail</p>
              <h2>Filtered security and workflow events</h2>
            </div>
            <div class="button-row">
              <button id="auditCsvButton" type="button">Export CSV</button>
              <button id="auditJsonButton" class="secondary-button" type="button">Export JSON</button>
            </div>
          </div>
          <form id="auditFilterForm" class="inline-form">
            <label>
              Action
              <input name="action" type="text" placeholder="login, user_updated..." />
            </label>
            <label>
              Target type
              <select name="targetType">
                <option value="">all</option>
                <option value="user">user</option>
                <option value="ticket">ticket</option>
                <option value="session">session</option>
                <option value="route">route</option>
                <option value="security">security</option>
                <option value="lab">lab</option>
              </select>
            </label>
            <label>
              Actor
              <input name="actor" type="text" placeholder="username or email" />
            </label>
            <label>
              From
              <input name="dateFrom" type="datetime-local" />
            </label>
            <label>
              To
              <input name="dateTo" type="datetime-local" />
            </label>
            <label>
              Limit
              <select name="limit">
                <option value="20">20</option>
                <option value="40" selected>40</option>
                <option value="80">80</option>
              </select>
            </label>
            <button type="submit">Apply</button>
          </form>
          <p id="auditMessage" class="status-text"></p>
          <div id="auditLogList" class="entry-list"></div>
        </section>
      </main>
    </div>

    <script type="module" src="assets/js/audit.js?v=20260408a"></script>
  </body>
</html>
