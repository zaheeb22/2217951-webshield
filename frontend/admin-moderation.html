<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Moderation | WebShield Lab</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=20260408b" />

  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Frontend Page</p>
          <h1>Moderation</h1>
        </div>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
          Menu
        </button>
        <nav class="nav">
          <a href="index.html">Overview</a>
          <a href="dashboard.html">User Dashboard</a>
          <a href="admin.html">Admin</a>

          <button id="logoutButton" class="ghost-button" type="button">Logout</button>
        </nav>
      </header>

      <main class="grid">
        <section class="panel">
          <p class="eyebrow">Access</p>
          <h2>Administrator session</h2>
          <div id="adminInfo" class="info-grid"></div>
          <p id="adminMessage" class="status-text"></p>
        </section>

        <section class="panel">
          <p class="eyebrow">Summary</p>
          <h2>Moderation overview</h2>
          <div id="moderationSummary" class="info-grid"></div>
        </section>

        <section class="panel full-span">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Moderation</p>
              <h2>Support ticket review and history</h2>
            </div>
          </div>
          <form id="ticketFilterForm" class="inline-form">
            <label>
              Status
              <select name="status">
                <option value="">all</option>
                <option value="pending">pending</option>
                <option value="reviewed">reviewed</option>
                <option value="resolved">resolved</option>
              </select>

            <button type="submit">Filter</button>
          </form>
          <p id="ticketMessage" class="status-text"></p>
          <div id="adminTicketList" class="entry-list"></div>
        </section>
      </main>

    <script type="module" src="assets/js/nav.js?v=20260408a"></script>
